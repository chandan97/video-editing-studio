events {}

http {
    server {
        listen 80;

        # 1. Normal traffic ko Frontend par bhejo
        location / {
            proxy_pass http://frontend:4200;
        }

        # 2. API traffic ko Backend par bhejo
        location /api/ {
            # Ye line '/api/upload' ko '/upload' banakar backend ko degi
            rewrite ^/api/(.*) /$1 break; 
            proxy_pass http://api:3000;
        }
    }
}