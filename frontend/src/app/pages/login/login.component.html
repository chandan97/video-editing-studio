<div class="min-h-screen bg-slate-900 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-slate-800 rounded-xl shadow-2xl p-8 border border-slate-700">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white mb-2">Welcome Back 🎬</h2>
      <p class="text-slate-400">Sign in to your Video Studio</p>
    </div>

    <!-- Error Message Box (Sirf tab dikhega jab errorMessage me kuch hoga) -->
    <div *ngIf="errorMessage" class="bg-red-500/10 border border-red-500 text-red-500 px-4 py-3 rounded-lg mb-6 text-sm">
      {{ errorMessage }}
    </div>

    <form class="space-y-6">
      <!-- Email Field -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
        <input type="email" 
               name="email"
               [(ngModel)]="email"
               class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
               placeholder="admin@studio.com">
      </div>

      <!-- Password Field -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
        <input type="password" 
               name="password"
               [(ngModel)]="password"
               class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
               placeholder="••••••••">
      </div>

      <!-- Submit Button -->
      <button type="button" 
              (click)="login()"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
        Sign In
      </button>
    </form>
    
  </div>
</div>
